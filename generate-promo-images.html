      font-size: 14px;

  <h1>Inwardly — Promo Image Generator</h1>
  <p>1024 × 1024 px IAP promotional images — no pricing shown, App Store guideline compliant.</p>

  <div class="canvases">
    <div class="card">
      <span class="label">inwardly+ Monthly</span>
      <canvas id="monthly" width="1024" height="1024"></canvas>
      <button onclick="download('monthly', 'inwardly-promo-monthly.png')">Download Monthly</button>
    </div>
    <div class="card">
      <span class="label">inwardly+ Annual</span>
      <canvas id="annual" width="1024" height="1024"></canvas>
      <button onclick="download('annual', 'inwardly-promo-annual.png')">Download Annual</button>
    </div>
  </div>

  <script>
    // ─── Brand tokens ───────────────────────────────────────────────────────────
    const INDIGO       = '#5B4A8A'
    const INDIGO_LIGHT = '#7B6BAA'
    const INDIGO_DARK  = '#3D2F6B'
    const GOLD         = '#D4A854'
    const GOLD_LIGHT   = '#E8C57A'
    const CANVAS_BG    = '#FAFAF9'
    const WHITE        = '#FFFFFF'

    // ─── Helpers ────────────────────────────────────────────────────────────────
    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath()
      ctx.moveTo(x + r, y)
      ctx.lineTo(x + w - r, y)
      ctx.quadraticCurveTo(x + w, y, x + w, y + r)
      ctx.lineTo(x + w, y + h - r)
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h)
      ctx.lineTo(x + r, y + h)
      ctx.quadraticCurveTo(x, y + h, x, y + h - r)
      ctx.lineTo(x, y + r)
      ctx.quadraticCurveTo(x, y, x + r, y)
      ctx.closePath()
    }

    function drawFeatureRow(ctx, x, y, text) {
      // Checkmark circle
      ctx.save()
      ctx.beginPath()
      ctx.arc(x + 18, y + 18, 18, 0, Math.PI * 2)
      ctx.fillStyle = 'rgba(212,168,84,0.18)'
      ctx.fill()
      ctx.strokeStyle = GOLD
      ctx.lineWidth = 2
      ctx.stroke()
      // Checkmark
      ctx.strokeStyle = GOLD
      ctx.lineWidth = 3
      ctx.lineCap = 'round'
      ctx.lineJoin = 'round'
      ctx.beginPath()
      ctx.moveTo(x + 10, y + 18)
      ctx.lineTo(x + 16, y + 24)
      ctx.lineTo(x + 27, y + 12)
      ctx.stroke()
      // Text
      ctx.font = '500 30px -apple-system, BlinkMacSystemFont, sans-serif'
      ctx.fillStyle = 'rgba(255,255,255,0.92)'
      ctx.textAlign = 'left'
      ctx.fillText(text, x + 48, y + 24)
      ctx.restore()
    }

    // ─── Shared background painter ───────────────────────────────────────────────
    function drawBackground(ctx, W, H, isAnnual) {
      // Base gradient
      const bg = ctx.createLinearGradient(0, 0, W * 0.6, H)
      bg.addColorStop(0, isAnnual ? '#251840' : '#2A1F4A')
      bg.addColorStop(1, isAnnual ? '#4A3270' : '#3D2F6B')
      ctx.fillStyle = bg
      ctx.fillRect(0, 0, W, H)

      // Radial glow — gold tint for annual, indigo for monthly
      const glowColor = isAnnual ? 'rgba(212,168,84,0.20)' : 'rgba(91,74,138,0.50)'
      const glow = ctx.createRadialGradient(W * 0.83, H * 0.17, 0, W * 0.83, H * 0.17, 500)
      glow.addColorStop(0, glowColor)
      glow.addColorStop(1, 'rgba(0,0,0,0)')
      ctx.fillStyle = glow
      ctx.fillRect(0, 0, W, H)

      // Subtle arc decoration
      ctx.save()
      ctx.strokeStyle = 'rgba(212,168,84,0.10)'
      ctx.lineWidth = 70
      ctx.beginPath()
      if (isAnnual) {
        ctx.arc(W + 60, H + 60, 680, -Math.PI * 0.85, -Math.PI * 0.35)
      } else {
        ctx.arc(-60, H + 60, 600, -Math.PI * 0.55, -Math.PI * 0.05)
      }
      ctx.stroke()
      ctx.restore()
    }

    // ─── Shared header (logo + wordmark + tagline + divider) ────────────────────
    function drawHeader(ctx, W, logo) {
      const PAD = 88
      const ICON_SIZE = 96
      const ICON_RADIUS = 22
      const ICON_Y = 68

      // App icon with rounded corners
      if (logo) {
        ctx.save()
        roundRect(ctx, PAD, ICON_Y, ICON_SIZE, ICON_SIZE, ICON_RADIUS)
        ctx.clip()
        ctx.drawImage(logo, PAD, ICON_Y, ICON_SIZE, ICON_SIZE)
        ctx.restore()

        // Subtle border ring around icon
        ctx.save()
        roundRect(ctx, PAD, ICON_Y, ICON_SIZE, ICON_SIZE, ICON_RADIUS)
        ctx.strokeStyle = 'rgba(255,255,255,0.15)'
        ctx.lineWidth = 1.5
        ctx.stroke()
        ctx.restore()
      }

      // Wordmark — vertically centred alongside the icon
      const WORDMARK_X = PAD + ICON_SIZE + 20
      const WORDMARK_Y = ICON_Y + 64   // baseline sits ~2/3 down the icon
      ctx.font = 'bold 78px Georgia, serif'
      ctx.fillStyle = WHITE
      ctx.textAlign = 'left'
      ctx.fillText('inwardly', WORDMARK_X, WORDMARK_Y)

      // Tagline below wordmark
      ctx.font = '400 30px -apple-system, BlinkMacSystemFont, sans-serif'
      ctx.fillStyle = 'rgba(212,168,84,0.80)'
      ctx.fillText('Your thoughts, understood.', WORDMARK_X, WORDMARK_Y + 42)

      // Fade-out divider
      ctx.save()
      const divGrad = ctx.createLinearGradient(PAD, 0, PAD + 600, 0)
      divGrad.addColorStop(0, 'rgba(212,168,84,0.65)')
      divGrad.addColorStop(1, 'rgba(212,168,84,0)')
      ctx.strokeStyle = divGrad
      ctx.lineWidth = 1.5
      ctx.beginPath()
      ctx.moveTo(PAD, 194)
      ctx.lineTo(PAD + 600, 194)
      ctx.stroke()
      ctx.restore()
    }

    // ─── Shared feature list ─────────────────────────────────────────────────────
    const FEATURES = [
      'Unlimited journal entries',
      'AI-powered weekly reviews',
      'Pattern & emotion detection',
      'Monthly reflection reports',
      'Personalized daily prompts',
      'Photo attachments & unlimited journals',
    ]

    // ─── Monthly ────────────────────────────────────────────────────────────────
    function drawMonthly() {
      const canvas = document.getElementById('monthly')
      const ctx = canvas.getContext('2d')
      const W = 1024, H = 1024, PAD = 88

      drawBackground(ctx, W, H, false)
      drawHeader(ctx, W, logo)

      // Headline
      ctx.textAlign = 'left'
      ctx.font = 'bold 64px Georgia, serif'
      ctx.fillStyle = WHITE
      ctx.fillText('Understand', PAD, 290)
      ctx.fillStyle = GOLD
      ctx.fillText('yourself deeply.', PAD, 362)

      // Sub-headline
      ctx.font = '400 28px -apple-system, BlinkMacSystemFont, sans-serif'
      ctx.fillStyle = 'rgba(255,255,255,0.55)'
      ctx.fillText('Everything you need to journal with intention.', PAD, 406)

      // Divider above features
      ctx.save()
      ctx.strokeStyle = 'rgba(255,255,255,0.10)'
      ctx.lineWidth = 1
      ctx.beginPath()
      ctx.moveTo(PAD, 438)
      ctx.lineTo(W - PAD, 438)
      ctx.stroke()
      ctx.restore()

      // Features ── start y=458, spacing 72
      FEATURES.forEach((f, i) => {
        drawFeatureRow(ctx, PAD, 458 + i * 72, f)
      })

      // Footnote
      ctx.font = '400 22px -apple-system, BlinkMacSystemFont, sans-serif'
      ctx.fillStyle = 'rgba(255,255,255,0.30)'
      ctx.textAlign = 'center'
      ctx.fillText('Cancel anytime · Manage in Apple ID settings', W / 2, H - 44)
    }

    // ─── Annual ─────────────────────────────────────────────────────────────────
    function drawAnnual() {
      const canvas = document.getElementById('annual')
      const ctx = canvas.getContext('2d')
      const W = 1024, H = 1024, PAD = 88

      drawBackground(ctx, W, H, true)
      drawHeader(ctx, W, logo)

      // ❖ pill accent
      ctx.save()
      roundRect(ctx, PAD, 218, 148, 46, 23)
      ctx.fillStyle = 'rgba(212,168,84,0.15)'
      ctx.fill()
      ctx.strokeStyle = 'rgba(212,168,84,0.45)'
      ctx.lineWidth = 1.5
      ctx.stroke()
      ctx.font = 'bold 22px -apple-system, BlinkMacSystemFont, sans-serif'
      ctx.fillStyle = GOLD
      ctx.textAlign = 'center'
      ctx.fillText('❖  inwardly+', PAD + 74, 248)
      ctx.restore()

      // Headline
      ctx.textAlign = 'left'
      ctx.font = 'bold 64px Georgia, serif'
      ctx.fillStyle = WHITE
      ctx.fillText('Everything,', PAD, 330)
      ctx.fillStyle = GOLD
      ctx.fillText('unlocked.', PAD, 402)

      // Sub-headline
      ctx.font = '400 28px -apple-system, BlinkMacSystemFont, sans-serif'
      ctx.fillStyle = 'rgba(255,255,255,0.55)'
      ctx.fillText('Your complete AI journaling companion.', PAD, 446)

      // Divider above features
      ctx.save()
      ctx.strokeStyle = 'rgba(255,255,255,0.10)'
      ctx.lineWidth = 1
      ctx.beginPath()
      ctx.moveTo(PAD, 472)
      ctx.lineTo(W - PAD, 472)
      ctx.stroke()
      ctx.restore()

      // Features ── start y=492, spacing 72
      FEATURES.forEach((f, i) => {
        drawFeatureRow(ctx, PAD, 492 + i * 72, f)
      })

      // Footnote
      ctx.font = '400 22px -apple-system, BlinkMacSystemFont, sans-serif'
      ctx.fillStyle = 'rgba(255,255,255,0.30)'
      ctx.textAlign = 'center'
      ctx.fillText('Billed annually · Cancel anytime · Manage in Apple ID settings', W / 2, H - 44)
    }

    // ─── Download helper ─────────────────────────────────────────────────────────
    function download(id, filename) {
      const canvas = document.getElementById(id)
      try {
        const dataURL = canvas.toDataURL('image/png')
        const link = document.createElement('a')
        link.download = filename
        link.href = dataURL
        document.body.appendChild(link)
        link.click()
        document.body.removeChild(link)
      } catch (e) {
        // Canvas is tainted (Chrome blocks toDataURL for file:// images).
        // Workaround: open the file via a local server (e.g. VS Code Live Server).
        alert(
          'Download blocked by browser security.\n\n' +
          'Fix: open this file via a local server instead of file://\n\n' +
          'In VS Code: right-click generate-promo-images.html → "Open with Live Server"'
        )
      }
    }

    // ─── Render ──────────────────────────────────────────────────────────────────
    // Logo is embedded as a base64 data URL — no fetch, no canvas taint.
    let logo = null
    const logoImg = document.getElementById('app-icon')

    function renderAll() {
      logo = logoImg
      drawMonthly()
      drawAnnual()
    }

    if (logoImg.complete && logoImg.naturalWidth > 0) {
      renderAll()
    } else {
      logoImg.onload = renderAll
      logoImg.onerror = () => { logo = null; drawMonthly(); drawAnnual() }
    }
  </script>
</body>
</html>
